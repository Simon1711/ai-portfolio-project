<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My AI Portfolio</title>

  <link rel="stylesheet" href="styles.css">

</head>

<body>

  <div class="intro-box">
    <h1>My AI Portfolio</h1>

    <p>
      Welcome! This is a basic page showcasing my journey into the world of Artificial Intelligence.
    </p>
  </div>

  <div id="chat-container">

    <div id="chat-bubble">💬</div>

    <div id="chat-widget" class="hidden">

      <div class="chat-header">
          AI Assistant 🤖
      </div>

      <div id="chat-messages">
          <div class="message ai-msg">Hello! How can I help you today?</div>
      </div>

      <div class="chat-controls">
          <input type="text" id="chat-input" placeholder="Ask me something...">
          <button id="chat-send">Send</button>
      </div>

    </div>

  </div>
<script src="components/chat-widget.js"></script>
<script src="app.js"></script>
</body>
</html>
